{% extends "base.html" %}
{% block content %}
<h1>Управление пользователями</h1>
<form method="post" class="grid-form">
    <input name="username" placeholder="Логин">
    <input name="full_name" placeholder="ФИО">
    <input name="email" placeholder="Email">
    <input name="password" placeholder="Пароль">
    <select name="role_id">{% for role in roles %}<option value="{{ role.id }}">{{ role.title }}</option>{% endfor %}</select>
    <button>Добавить</button>
</form>
<table>
    <tr><th>ID</th><th>Логин</th><th>ФИО</th><th>Email</th><th>Роль</th><th>Активен</th><th></th></tr>
    {% for u in users %}
        <tr><td>{{ u.id }}</td><td>{{ u.username }}</td><td>{{ u.full_name }}</td><td>{{ u.email }}</td><td>{{ u.role.title }}</td><td>{{ 'да' if u.is_active else 'нет' }}</td><td><a href="{{ url_for('admin_toggle_user', user_id=u.id) }}">изменить</a></td></tr>
    {% endfor %}
</table>
{% endblock %}
