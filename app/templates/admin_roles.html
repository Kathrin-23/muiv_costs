{% extends "base.html" %}
{% block content %}
<h1>Управление ролями</h1>
<section class="cards">
    {% for role in roles %}
        <div class="card"><b>{{ role.title }}</b><span>{{ role.name }}</span></div>
    {% endfor %}
</section>
<form method="post" class="grid-form">
    <label>Пользователь<select name="user_id">{% for u in users %}<option value="{{ u.id }}">{{ u.full_name }} ({{ u.username }})</option>{% endfor %}</select></label>
    <label>Роль<select name="role_id">{% for role in roles %}<option value="{{ role.id }}">{{ role.title }}</option>{% endfor %}</select></label>
    <button>Назначить роль</button>
</form>
<table>
    <tr><th>Пользователь</th><th>Логин</th><th>Текущая роль</th></tr>
    {% for u in users %}
        <tr><td>{{ u.full_name }}</td><td>{{ u.username }}</td><td>{{ u.role.title }}</td></tr>
    {% endfor %}
</table>
{% endblock %}
